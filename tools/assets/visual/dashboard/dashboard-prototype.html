/* ─── SVG Icons ─── */
const icons = {

function Icon({ name, size = 16, color, style: s = {} }) {
  const Ic = icons[name];
  if (!Ic) return null;
  return <Ic width={size} height={size} style={{ color, minWidth: size, flexShrink: 0, ...s }} />;
}

/* ─── Helpers ─── */
function getScoreColor(score, max = 5) {
  const pct = score / max;
  if (pct >= 0.8) return "#22c55e";
  if (pct >= 0.6) return "#eab308";
  if (pct >= 0.4) return "#f97316";
  return "#ef4444";
}

function getRatingStyle(rating) {
  const map = {
    "Crítico": { bg: "#fee2e2", text: "#991b1b" },
    "Básico": { bg: "#ffedd5", text: "#9a3412" },
    "Intermediário": { bg: "#fef9c3", text: "#854d0e" },
    "Avançado": { bg: "#dcfce7", text: "#166534" },
    "Excelente": { bg: "#d1fae5", text: "#065f46" },
  };
  return map[rating] || map["Intermediário"];
}

function resultIcon(result) {
  if (result === "pass") return { name: "check", color: "#22c55e" };
  if (result === "fail") return { name: "x", color: "#ef4444" };
  if (result === "partial") return { name: "alert", color: "#eab308" };
  return { name: "info", color: "#6366f1" };
}

function resultBg(result) {
  if (result === "pass") return "#f0fdf4";
  if (result === "fail") return "#fef2f2";
  if (result === "partial") return "#fffbeb";
  return "#eff6ff";
}

function resultLabel(result) {
  if (result === "pass") return "Aprovado";
  if (result === "fail") return "Falhou";
  if (result === "partial") return "Parcial";
  return "Info";
}

/* ─── Score Ring ─── */
function ScoreRing({ score, max = 5, size = 130 }) {
  const pct = score / max;
  const r = (size - 14) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct);
  const color = getScoreColor(score, max);
  return (
    <svg width={size} height={size} style={{ display: "block", margin: "0 auto" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth="10" />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="10"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: "stroke-dashoffset 0.8s ease" }} />
      <text x={size/2} y={size/2 - 4} textAnchor="middle" style={{ fontSize: 28, fontWeight: 700 }} fill={color}>
        {score % 1 ? score.toFixed(2) : score}
      </text>
      <text x={size/2} y={size/2 + 16} textAnchor="middle" style={{ fontSize: 12 }} fill="#9ca3af">de {max}</text>
    </svg>
  );
}

/* ─── Evidence Table Row ─── */
function EvidenceRow({ ev }) {
  const [expanded, setExpanded] = useState(false);
  const ri = resultIcon(ev.result);
  return (
    <div className="evidence-row" style={{ borderBottom: "1px solid #f3f4f6" }}>
      <div onClick={() => setExpanded(!expanded)}
        style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", cursor: "pointer" }}>
        <Icon name={ri.name} size={16} color={ri.color} />
        <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: "#111827" }}>{ev.check}</span>
        <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 999, background: resultBg(ev.result), color: ri.color }}>
          {resultLabel(ev.result)}
        </span>
        <span style={{ fontSize: 11, fontWeight: 600, color: ev.score_impact.startsWith("-") ? "#ef4444" : ev.score_impact.startsWith("+0") ? "#9ca3af" : "#22c55e", minWidth: 28, textAlign: "right" }}>
          {ev.score_impact}
        </span>
        <Icon name={expanded ? "up" : "down"} size={12} color="#9ca3af" />
      </div>
      {expanded && (
        <div className="fade-in" style={{ padding: "0 12px 12px 38px" }}>
          <p style={{ fontSize: 12, color: "#4b5563", lineHeight: 1.7, margin: "0 0 8px" }}>{ev.detail}</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <div style={{ fontSize: 11, color: "#6b7280" }}>
              <span style={{ fontWeight: 600 }}>Fonte: </span>{ev.source}
            </div>
            {ev.url_captured && (
              <div style={{ fontSize: 11, padding: "6px 10px", background: "#f8fafc", borderRadius: 6, border: "1px solid #e2e8f0", fontFamily: "'SF Mono', 'Fira Code', monospace", color: "#475569", wordBreak: "break-all" }}>
                {ev.url_captured}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Module Card with Evidence ─── */
function ModuleCard({ mod }) {
  const [showEvidence, setShowEvidence] = useState(false);
  const color = getScoreColor(mod.score);
  const pct = (mod.score / mod.max_score) * 100;
  const passCount = mod.evidence.filter(e => e.result === "pass").length;
  const failCount = mod.evidence.filter(e => e.result === "fail").length;

  return (
    <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden", transition: "box-shadow 0.2s" }}
      onMouseEnter={e => e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)"}
      onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>

      {/* Header */}
      <div style={{ padding: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ padding: 8, borderRadius: 8, backgroundColor: color + "18" }}>
            <Icon name={mod.icon} size={20} color={color} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 14, color: "#111827" }}>{mod.label}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
              <div style={{ height: 6, width: 96, background: "#f3f4f6", borderRadius: 999, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 999, transition: "width 0.7s ease" }} />
              </div>
              <span style={{ fontSize: 13, fontWeight: 700, color }}>{mod.score}/{mod.max_score}</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <span style={{ fontSize: 11, color: "#22c55e", fontWeight: 600 }}>{passCount} ok</span>
            {failCount > 0 && <span style={{ fontSize: 11, color: "#ef4444", fontWeight: 600 }}>{failCount} falha{failCount > 1 ? "s" : ""}</span>}
          </div>
        </div>
        <p style={{ fontSize: 13, color: "#4b5563", lineHeight: 1.6, margin: 0 }}>{mod.comment}</p>

        {/* Scoring breakdown */}
        <div style={{ marginTop: 10, padding: "6px 10px", background: "#f8fafc", borderRadius: 6, fontSize: 11, color: "#64748b", fontFamily: "'SF Mono', 'Fira Code', monospace" }}>
          {mod.scoring_breakdown}
        </div>
      </div>

      {/* Evidence toggle */}
      <button onClick={() => setShowEvidence(!showEvidence)}
        style={{ width: "100%", padding: "10px 20px", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontSize: 12, fontWeight: 500, color: "#6366f1", background: showEvidence ? "#eef2ff" : "#f9fafb", border: "none", borderTop: "1px solid #e5e7eb", cursor: "pointer", transition: "background 0.15s" }}>
        <Icon name={showEvidence ? "up" : "down"} size={13} color="#6366f1" />
        {showEvidence ? "Ocultar evidências" : `Ver ${mod.evidence.length} evidências detalhadas`}
      </button>

      {/* Evidence list */}
      {showEvidence && (
        <div className="fade-in" style={{ borderTop: "1px solid #e5e7eb" }}>
          {mod.evidence.map((ev, i) => (
            <EvidenceRow key={i} ev={ev} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Issue Card ─── */
function IssueCard({ issue }) {
  const isCritical = issue.severity === "critical";
  const bg = isCritical ? "#fef2f2" : "#fffbeb";
  const border = isCritical ? "#fecaca" : "#fde68a";
  const textColor = isCritical ? "#b91c1c" : "#b45309";
  const iconName = isCritical ? "x" : "alert";
  return (
    <div style={{ borderRadius: 12, border: `1px solid ${border}`, background: bg, padding: 16 }}>
      <div style={{ display: "flex", gap: 12 }}>
        <Icon name={iconName} size={18} color={textColor} />
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", color: textColor }}>{isCritical ? "Crítico" : "Atenção"}</span>
            <span style={{ fontSize: 11, color: "#9ca3af" }}>#{issue.rank}</span>
          </div>
          <div style={{ fontWeight: 600, fontSize: 14, color: "#111827" }}>{issue.title}</div>
          <p style={{ fontSize: 12, color: "#4b5563", margin: "4px 0 0" }}>{issue.description}</p>
          <div style={{ marginTop: 8, padding: 10, background: "rgba(255,255,255,0.6)", borderRadius: 8 }}>
            <p style={{ fontSize: 12, margin: 0 }}>
              <span style={{ fontWeight: 600, color: "#374151" }}>Impacto: </span>
              <span style={{ color: "#4b5563" }}>{issue.business_impact}</span>
            </p>
            <p style={{ fontSize: 12, margin: "4px 0 0" }}>
              <span style={{ fontWeight: 600, color: "#374151" }}>Ação: </span>
              <span style={{ color: "#4b5563" }}>{issue.recommendation}</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Rec Section ─── */
function RecSection({ title, items, color }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <h4 style={{ fontSize: 14, fontWeight: 600, color: "#374151", marginBottom: 10 }}>{title}</h4>
      {items.map((item, i) => (
        <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, fontSize: 13, color: "#4b5563", marginBottom: 8 }}>
          <span style={{ marginTop: 5, width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0 }} />
          {item}
        </div>
      ))}
    </div>
  );
}

/* ─── Chart Data ─── */
const radarData = Object.values(diagnostic.modules).map(m => ({
  module: m.label.split(" ").slice(0, 2).join(" "),
  score: m.score, fullMark: m.max_score
}));

const barData = Object.values(diagnostic.modules).map(m => ({
  name: m.label.split(" ")[0],
  score: m.score, max: m.max_score
}));

/* ─── Main Dashboard ─── */
function App() {
  const [tab, setTab] = useState("overview");
  const { overall_maturity: maturity } = diagnostic;
  const rStyle = getRatingStyle(maturity.rating);

  return (
    <div style={{ minHeight: "100vh", background: "#f9fafb" }}>
      {/* Header */}
      <header style={{ background: "#fff", borderBottom: "1px solid #e5e7eb", padding: "16px 24px" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 32, height: 32, background: "#4f46e5", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon name="activity" size={16} color="#fff" />
              </div>
              <span style={{ fontSize: 18, fontWeight: 700, color: "#111827" }}>Blind Analytics</span>
            </div>
            <p style={{ fontSize: 13, color: "#6b7280", margin: "4px 0 0 44px" }}>Diagnóstico de Maturidade de Mensuração</p>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 14, color: "#4b5563" }}>
              <Icon name="link" size={14} color="#6b7280" />
              <span style={{ fontWeight: 600 }}>{diagnostic.domain}</span>
            </div>
            <p style={{ fontSize: 11, color: "#9ca3af", margin: "2px 0 0" }}>{new Date(diagnostic.audit_timestamp).toLocaleString("pt-BR")}</p>
          </div>
        </div>
      </header>

      {/* Tabs */}
      <div style={{ background: "#fff", borderBottom: "1px solid #e5e7eb" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px", display: "flex", gap: 24 }}>
          {[{ id: "overview", label: "Visão Geral" }, { id: "issues", label: "Problemas" }, { id: "actions", label: "Plano de Ação" }].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={tab === t.id ? "tab-active" : "tab-inactive"}
              style={{ padding: "12px 0", fontSize: 14, fontWeight: 500, background: "none", border: "none", cursor: "pointer" }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <main style={{ maxWidth: 1100, margin: "0 auto", padding: "24px" }}>
        {tab === "overview" && (
          <div className="fade-in">
            {/* Hero */}
            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", padding: 24, marginBottom: 24 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 32 }}>
                <ScoreRing score={maturity.score} max={maturity.max_score} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                    <span style={{ fontSize: 20, fontWeight: 700, color: "#111827" }}>Maturidade Geral</span>
                    <span style={{ padding: "4px 12px", borderRadius: 999, fontSize: 12, fontWeight: 600, background: rStyle.bg, color: rStyle.text }}>{maturity.rating}</span>
                  </div>
                  <p style={{ fontSize: 14, color: "#4b5563", lineHeight: 1.6, margin: 0 }}>
                    A operação possui a base de eventos bem configurada, mas sofre com quebras severas de atribuição e carece de modernização da infraestrutura Server-Side.
                  </p>
                  <div style={{ display: "flex", gap: 24, marginTop: 16 }}>
                    <div style={{ textAlign: "center" }}><div style={{ fontSize: 24, fontWeight: 700, color: "#ef4444" }}>2</div><div style={{ fontSize: 11, color: "#6b7280" }}>Críticos</div></div>
                    <div style={{ textAlign: "center" }}><div style={{ fontSize: 24, fontWeight: 700, color: "#f59e0b" }}>1</div><div style={{ fontSize: 11, color: "#6b7280" }}>Atenção</div></div>
                    <div style={{ textAlign: "center" }}><div style={{ fontSize: 24, fontWeight: 700, color: "#22c55e" }}>1</div><div style={{ fontSize: 11, color: "#6b7280" }}>Excelente</div></div>
                  </div>
                </div>
                <div style={{ width: 260, height: 200 }}>
                  <ResponsiveContainer>
                    <RadarChart data={radarData}>
                      <PolarGrid stroke="#e5e7eb" />
                      <PolarAngleAxis dataKey="module" tick={{ fontSize: 10, fill: "#6b7280" }} />
                      <PolarRadiusAxis angle={90} domain={[0, 5]} tick={{ fontSize: 9 }} />
                      <Radar dataKey="score" stroke="#6366f1" fill="#6366f1" fillOpacity={0.2} strokeWidth={2} />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* Module Cards */}
            <h2 style={{ fontSize: 16, fontWeight: 600, color: "#111827", marginBottom: 12 }}>Módulos Avaliados</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 24 }}>
              {Object.values(diagnostic.modules).map((mod, i) => (
                <ModuleCard key={i} mod={mod} />
              ))}
            </div>

            {/* Bar Chart */}
            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", padding: 20 }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, color: "#111827", marginBottom: 16 }}>Comparativo por Módulo</h3>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={barData} barCategoryGap="30%">
                  <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                  <XAxis dataKey="name" tick={{ fontSize: 11 }} />
                  <YAxis domain={[0, 5]} tick={{ fontSize: 11 }} />
                  <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} formatter={v => [`${v}/5`, "Score"]} />
                  <Bar dataKey="score" radius={[6, 6, 0, 0]}>
                    {barData.map((entry, i) => <Cell key={i} fill={getScoreColor(entry.score)} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        )}

        {tab === "issues" && (
          <div className="fade-in" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <h2 style={{ fontSize: 16, fontWeight: 600, color: "#111827" }}>Problemas Encontrados ({diagnostic.top_issues.length})</h2>
            {diagnostic.top_issues.map(issue => <IssueCard key={issue.rank} issue={issue} />)}
          </div>
        )}

        {tab === "actions" && (
          <div className="fade-in" style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", padding: 24 }}>
            <h2 style={{ fontSize: 16, fontWeight: 600, color: "#111827", marginBottom: 20 }}>Plano de Ação Recomendado</h2>
            <RecSection title="Vitórias Rápidas (sem código)" items={diagnostic.recommendations_summary.quick_wins} color="#22c55e" />
            <RecSection title="Esforço Médio (configuração técnica)" items={diagnostic.recommendations_summary.medium_effort} color="#eab308" />
            <RecSection title="Esforço Alto (infraestrutura)" items={diagnostic.recommendations_summary.high_effort} color="#ef4444" />
          </div>
        )}
      </main>

      <footer style={{ borderTop: "1px solid #e5e7eb", background: "#fff", marginTop: 32, padding: 16 }}>
        <p style={{ textAlign: "center", fontSize: 12, color: "#9ca3af", margin: 0 }}>Blind Analytics — Protótipo de Dashboard (dados simulados)</p>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
